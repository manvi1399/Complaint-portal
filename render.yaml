services:
  - type: web
    name: complaint-portal
    env: node
    buildCommand: npm install && npm run build
    startCommand: npx tsx server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: OTP_FROM_EMAIL
        sync: false
      - key: OTP_DEMO_PREVIEW
        value: "false"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: complaint_portal
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /api/health
